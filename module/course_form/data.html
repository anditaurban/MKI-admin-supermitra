<div class="bg-white p-6">
  <section class="section">

    <!-- Header -->
    <div class="flex flex-wrap items-start justify-between mb-6 gap-4">
      <div>
        <h1 id="formTitle" class="text-2xl font-bold mb-1">FORM INPUT PRODUK</h1>
        <nav class="text-gray-500 text-sm flex items-center flex-wrap gap-1">
          <span>Persediaan</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium">Form Input Produk</span>
        </nav>
      </div>

      <div class="flex flex-wrap gap-2">
        <button onclick="createData()" id="addButton"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded">
          Simpan Data
        </button>

        <button onclick="updateData()" id="updateButton"
          class="hidden bg-yellow-600 hover:bg-yellow-700 text-white text-sm px-4 py-2 rounded">
          Update Data
        </button>

        <button onclick="loadModuleContent('product')" class="bg-gray-300 text-sm px-4 py-2 rounded">
          ⬅️ Kembali
        </button>
      </div>
    </div>

  <form id="courseForm" onsubmit="event.preventDefault(); window.detail_id ? updateCourse() : saveCourse();" class="space-y-8">
    
    <section class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
      <h3 class="text-lg font-semibold text-slate-700 flex items-center gap-2 border-b pb-3">
        📚 Topic Information
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-600">Course Topic Name <span class="text-red-500">*</span></label>
          <input required type="text" id="formJudul" placeholder="Contoh: Belajar JavaScript Dasar" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" />
        </div>
        <div class="space-y-2">
  <label class="text-sm font-semibold text-slate-600">Business Category <span class="text-red-500">*</span></label>
  <select required id="formKategori" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition bg-white">
    <option value="" disabled selected>Pilih Kategori Bisnis...</option>
    </select>
</div>
      </div>
    </section>

    <section class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
      <div class="flex items-center justify-between border-b pb-3">
        <h3 class="text-lg font-semibold text-slate-700 flex items-center gap-2">
          🎥 Video Segments
        </h3>
        <button type="button" onclick="addVideoRow()" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg flex items-center gap-1 font-semibold transition">
          ➕ Add Video Part
        </button>
      </div>

      <div id="videoListContainer" class="space-y-6 pt-2">
        </div>
    </section>

    <div class="flex justify-end gap-3 pb-10">
      <button type="button" onclick="console.log('Kembali diklik')" class="px-6 py-2.5 rounded-lg border border-slate-200 font-semibold text-slate-600 hover:bg-slate-50 transition">
        Discard
      </button>
      <button type="submit" id="btnSubmitForm" class="px-8 py-2.5 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 shadow-md shadow-blue-200 flex items-center gap-2 transition">
        💾 Publish Course
      </button>
    </div>

  </form>
</div>
