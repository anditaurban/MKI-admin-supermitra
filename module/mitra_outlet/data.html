<div class="bg-white p-6">
  <section class="section">

    <!-- Header -->
    <div class="flex flex-wrap items-start justify-between mb-6 gap-4">
      <div>
        <h1 id="formTitle" class="text-2xl font-bold mb-1">TITIK OUTLET MITRA</h1>
        <nav class="text-gray-500 text-sm flex items-center flex-wrap gap-1">
          <span>Beranda</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium">Pelangga</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium">Titik Outlet</span>
        </nav>
      </div>

      <div class="flex flex-wrap gap-2">

        <button onclick="loadModuleContent('mitra')" class="bg-gray-300 text-sm px-4 py-2 rounded">
          ⬅️ Kembali
        </button>
      </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6">
        <div class="flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" onkeyup="debounceSearch()" placeholder="🔍 Cari nama mitra atau booth..." 
                   class="px-4 py-2 border border-gray-300 rounded-lg w-full md:w-80 focus:ring-blue-500 focus:border-blue-500 text-sm" />
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-sm text-left">
            <thead class="bg-gray-50 text-gray-700 uppercase text-xs font-semibold">
                <tr>
                    <th class="px-6 py-4 text-center w-16">No</th>
                    <th class="px-6 py-4">Mitra & Kategori</th>
                    <th class="px-6 py-4">Nama Booth</th>
                    <th class="px-6 py-4">Wilayah</th>
                    <th class="px-6 py-4 text-center">Status</th>
                    <th class="px-6 py-4 text-center w-24">Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-gray-100">
                </tbody>
        </table>
    </div>

    <div id="pagination" class="mt-6 flex justify-end gap-2"></div>
</div>

<div id="modalDetail" class="hidden fixed inset-0 bg-black/60 z-[999] flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-5xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
        <div class="p-4 border-b flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-gray-800">Detail & Lokasi Outlet</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">✕</button>
        </div>
        
        <div class="flex flex-col md:flex-row overflow-y-auto">
            <div class="w-full md:w-1/3 p-6 border-r space-y-4 bg-white">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Nama Mitra</label>
                    <p id="detNama" class="font-semibold text-gray-800">-</p>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Booth</label>
                    <p id="detBooth" class="text-gray-700 font-medium">-</p>
                    <p id="detAlamat" class="text-xs text-gray-500">-</p>
                </div>
                <div class="pt-2 border-t">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Wilayah</label>
                    <p id="detRegion" class="text-sm text-gray-600 leading-relaxed">-</p>
                </div>
                
                <div class="pt-4 border-t space-y-3">
    <label class="text-xs font-bold text-gray-700">Update Status Persetujuan</label>
    <select id="statusSelect" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </select>
    <button onclick="saveStatusUpdate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition text-sm shadow-sm">
        Simpan Status
    </button>
    
    <div class="pt-4 border-t space-y-3">

        Kabari via WA

    <button onclick="openInGoogleMaps()" class="w-full flex justify-center items-center gap-2 bg-white hover:bg-gray-50 text-gray-700 font-bold py-2 rounded-lg border border-gray-300 transition text-sm shadow-sm mt-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />

        </svg>
        Buka di Google Maps
    </button>
</div>
            </div>

            <div class="w-full md:w-2/3 h-[400px] md:h-auto bg-gray-100 relative">
                <div id="map" class="w-full h-full z-0"></div>
            </div>
        </div>
    </div>
</div>
