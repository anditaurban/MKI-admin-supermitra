<div class="bg-white p-4">
  <div class="mb-6 flex items-center justify-between">
    <div>
        <h1 id="formTitle" class="text-2xl font-bold mb-1">Kelola Media Promosi</h1>
        <nav class="text-gray-500 text-sm flex items-center flex-wrap gap-1">
          <span>Beranda</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium">Kemitraan</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium">Form Input Media</span>
        </nav>
      </div>
    <button onclick="loadModuleContent('content')" class="bg-gray-300 text-sm px-4 py-2 rounded">
          ⬅️ Kembali
    </button>
  </div>

  <section class="bg-blue-50/50 p-6 rounded-xl border border-blue-100 shadow-sm mb-6 flex items-center gap-4">
    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center font-bold text-xl">
      🏷️
    </div>
    <div>
      <h3 id="infoCategory" class="text-lg font-bold text-slate-800">-</h3>
      <p id="infoDesc" class="text-sm text-slate-600">-</p>
    </div>
    <div class="ml-auto">
      <span id="infoStatus" class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full border border-green-200">Active</span>
    </div>
  </section>

  <section class="mb-8">
    <div class="flex items-center justify-between border-b border-slate-200 pb-3 mb-4">
      <h3 class="text-lg font-semibold text-slate-700 flex items-center gap-2">
        🖼️ Media Tersimpan
      </h3>
      <span id="mediaCountBadge" class="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded font-semibold">0 / 10 Media</span>
    </div>
    
    <div id="existingMediaContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      </div>
  </section>

  <section class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
    <div class="flex items-center justify-between border-b pb-3">
      <h3 class="text-lg font-semibold text-slate-700 flex items-center gap-2">
        ➕ Tambah Media Baru
      </h3>
      <button type="button" onclick="addMediaRow()" class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-1 font-semibold border border-blue-200 transition">
        + Tambah Baris
      </button>
    </div>

    <div id="newMediaContainer" class="space-y-4 pt-2">
      </div>

    <div class="pt-6 border-t border-slate-100 flex justify-end">
      <button type="button" id="btnSaveNewMedia" onclick="saveNewMediaBatch()" class="hidden px-8 py-2.5 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 shadow-md shadow-blue-200 flex items-center gap-2 transition">
        💾 Simpan Media Baru
      </button>
    </div>
  </section>
</div>
