<div class="bg-white p-4">
  <section class="section">
    <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
      <div>
        <h1 id="formTitle" class="text-2xl font-bold mb-1 text-gray-800">PELATIHAN</h1>
        <nav class="text-gray-500 text-sm flex items-center flex-wrap gap-1">
          <span>Beranda</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          <span class="text-gray-800">Pelatihan</span>
        </nav>
      </div>

      <div class="flex flex-wrap gap-2">
        <button
          id="addButton"
          class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-4 py-2 rounded shadow"
        >
          Tambah Course
        </button>
        <!-- <button
          onclick="importData()"
          class="bg-orange-500 hover:bg-orange-600 text-white text-sm font-medium px-4 py-2 rounded shadow"
        >
          Import Excel
        </button> -->
      </div>
    </div>

    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6 text-sm">
      <div class="flex items-center gap-2 w-full md:w-auto">
        <input
          type="text"
          id="searchInput"
          onkeyup="debounceSearch()"
          placeholder="🔎 Cari course..."
          class="px-4 py-2 border border-gray-300 rounded-lg w-full md:w-96 focus:ring-red-500 focus:border-red-500"
        />
      </div>
    </div>

    <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-200 mb-6">
  <table class="w-full text-sm text-left text-gray-600">
    <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b border-gray-200">
      <tr>
        <th scope="col" class="px-6 py-4 w-16 text-center">No</th>
        <th scope="col" class="px-6 py-4">Topik Course</th>
        <th scope="col" class="px-6 py-4">Kategori Bisnis</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      </tbody>
  </table>
</div>

    <div class="mt-8 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
      <p id="infoText" class="hidden md:block text-sm text-gray-600 text-left"></p>
      <div id="pagination" class="hidden md:flex w-full justify-end items-center flex-wrap gap-2 text-sm"></div>

      <div class="block md:hidden text-sm text-center mb-12">
        <label for="pageSelect" class="mr-2">Go to Page:</label>
        <select id="pageSelect" class="px-2 py-1 border rounded"></select>
      </div>
    </div>
  </section>
</div>
